<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY BRAIN TECH SOLUTIONS</title>
    <style>
        /* TERRIBLE AESTHETICS & ACCESSIBILITY */
        body {
            background-color: #ff00ff; /* Blinding Magenta */
            background-image: repeating-linear-gradient(45deg, yellow 25%, transparent 25%, transparent 75%, yellow 75%, yellow), repeating-linear-gradient(45deg, yellow 25%, transparent 25%, transparent 75%, yellow 75%, yellow);
            background-position: 0 0, 10px 10px;
            background-size: 20px 20px;
            color: #00ff00; /* Neon green text on yellow/magenta */
            font-family: "Papyrus", "Comic Sans MS", fantasy;
            overflow-x: hidden;
            
            /* NEW: Hide the real cursor entirely */
            cursor: none; 
            
            /* NEW: Default state is blurry */
            filter: blur(4px);
            transition: filter 0.3s ease;
            height: 200vh; /* Force scrolling just to make it annoying */
        }

        /* NEW: The lagging, terrible fake cursor */
        #fake-cursor {
            position: fixed;
            width: 80px;
            height: 80px;
            background-color: rgba(0, 0, 0, 0.8);
            border: 5px solid lime;
            border-radius: 50%;
            pointer-events: none; /* Clicks pass through it */
            z-index: 9999999;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 10px;
            font-family: monospace;
            text-align: center;
            /* The transition is what makes it lag behind the real mouse */
            transition: top 0.15s ease-out, left 0.15s ease-out; 
            transform: translate(-50%, -50%);
        }

        /* Fake Loading Screen blocking the whole page */
        #terrible-loader {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: black;
            color: lime;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            font-size: 2em;
            cursor: none;
        }

        /* Elements that constantly vibrate */
        .shake-it {
            animation: shake 0.2s infinite; /* Made it shake faster */
        }
        @keyframes shake {
            0% { transform: translate(2px, 2px) rotate(0deg); }
            20% { transform: translate(-3px, -2px) rotate(-2deg); }
            40% { transform: translate(-3px, 0px) rotate(2deg); }
            60% { transform: translate(3px, 2px) rotate(0deg); }
            80% { transform: translate(2px, -2px) rotate(2deg); }
            100% { transform: translate(-2px, 2px) rotate(-2deg); }
        }

        .container {
            width: 70%;
            margin: 50px auto;
            background: rgba(0, 0, 255, 0.9);
            border: 20px dotted red;
            padding: 40px;
        }

        /* Form elements designed to infuriate */
        input[type="text"] {
            width: 100%;
            padding: 15px;
            font-size: 24px;
            background-color: transparent;
            color: white;
            border: 5px solid yellow;
            transform: skew(-10deg);
            cursor: none;
        }

        select {
            width: 100%;
            font-size: 18px;
            padding: 10px;
            background: orange;
            cursor: none;
        }

        /* The runaway checkbox container */
        #terms-container {
            position: relative;
            background: white;
            color: black;
            padding: 20px;
            margin-top: 20px;
            border: 5px dashed black;
            font-weight: bold;
            height: 100px;
        }

        #runaway-checkbox {
            position: absolute;
            transform: scale(2); /* Giant checkbox */
            cursor: none;
        }

        #doom-btn {
            background-color: red;
            color: white;
            font-size: 50px;
            width: 100%;
            height: 150px;
            margin-top: 50px;
            border: none;
            box-shadow: inset 0 0 50px black;
            cursor: none;
        }
        #doom-btn:active { background-color: darkred; }

        /* The CSS for the infinite chaotic popups */
        .chaos-popup {
            position: fixed;
            width: 300px;
            height: 200px;
            background: repeating-radial-gradient(circle, red, yellow 10%, red 20%);
            color: black;
            border: 10px solid white;
            z-index: 9999;
            text-align: center;
            font-size: 24px;
            font-weight: 900;
            box-shadow: 20px 20px 100px black;
            padding-top: 30px;
            cursor: none;
        }
    </style>
</head>
<body>

    <!-- FAKE CURSOR -->
    <div id="fake-cursor">YOUR<br>MOUSE<br>IS HERE</div>

    <!-- FAKE LOADING SCREEN -->
    <div id="terrible-loader" onclick="startNightmare()">
        <div class="shake-it">DOWNLOADING MORE RAM...</div>
        <div id="loading-percent">0%</div>
        <div style="font-size: 15px; margin-top: 20px;">(Click anywhere to speed up)</div>
    </div>

    <marquee scrollamount="80" direction="right" class="shake-it"><h1>PLEASE ENTER YOUR CREDIT CARD TO PROVE YOU ARE NOT A ROBOT</h1></marquee>

    <div class="container shake-it">
        <h2>Enter Data Here:</h2>
        
        <form onsubmit="event.preventDefault();">
            <label>Name (Case sensitive, no vowels allowed):</label>
            <input type="text" id="bad-input" value="JD PRT">
            <br><br>

            <label>Year of Birth (Good luck keeping it):</label><br>
            <select id="year-dropdown"></select>
            <br><br>

            <div id="terms-container">
                I agree to sell my soul and my browsing history:
                <!-- This checkbox will run away -->
                <input type="checkbox" id="runaway-checkbox" onmouseover="dodgeMouse(this)">
            </div>

            <button id="doom-btn" onclick="triggerTheSwarm()">SUBMIT AND CLAIM VIRUS</button>
        </form>
    </div>

    <script>
        // THE DRUNK CURSOR LOGIC
        const fakeCursor = document.getElementById('fake-cursor');
        document.addEventListener('mousemove', (e) => {
            // Update cursor position
            fakeCursor.style.left = e.clientX + 'px';
            fakeCursor.style.top = e.clientY + 'px';
        });

        // THE "STOP MOVING" BLUR LOGIC
        let blurTimer;
        document.addEventListener('mousemove', () => {
            // Unblur when moving
            document.body.style.filter = 'blur(0px)';
            clearTimeout(blurTimer);
            // Re-blur if they stop for 500ms
            blurTimer = setTimeout(() => {
                document.body.style.filter = 'blur(4px)';
            }, 500);
        });

        // SCROLL JACKING LOGIC
        window.addEventListener('scroll', () => {
            // 30% chance to violently throw the user back to the top when they try to scroll
            if (Math.random() > 0.7) {
                window.scrollTo({ top: 0, behavior: 'instant' });
            }
        });

        // REVERSE TYPING LOGIC
        const nameInput = document.getElementById('bad-input');
        nameInput.addEventListener('input', function() {
            // Instantly reverses whatever the user types
            this.value = this.value.split('').reverse().join('');
        });

        // FAKE LOADER LOGIC
        let loadInterval;
        let percent = 0;
        window.onload = () => {
            const pctText = document.getElementById('loading-percent');
            loadInterval = setInterval(() => {
                percent += Math.floor(Math.random() * 15);
                if (Math.random() > 0.7) percent -= 20; 
                if (percent < 0) percent = 0;
                
                if (percent >= 99) {
                    pctText.innerText = "99.9999% (Stuck)";
                    clearInterval(loadInterval);
                } else {
                    pctText.innerText = percent + "%";
                }
            }, 500);

            // Populate the year dropdown out of order
            const select = document.getElementById('year-dropdown');
            let years = [];
            for(let i = 1950; i <= 2024; i++) years.push(i);
            years.sort(() => Math.random() - 0.5); 
            years.forEach(year => {
                let opt = document.createElement('option');
                opt.value = year;
                opt.innerHTML = year;
                select.appendChild(opt);
            });

            // GASLIGHTING DROPDOWN: Randomly changes the selected year every 1.5 seconds
            setInterval(() => {
                if (select.options.length > 0) {
                    select.selectedIndex = Math.floor(Math.random() * select.options.length);
                }
            }, 1500);
        };

        // AUDIO VIRUS & LOADER DISMISSAL
        function startNightmare() {
            document.getElementById('terrible-loader').style.display = 'none';
            
            const msg = new SpeechSynthesisUtterance();
            msg.text = "Error. Error. Your computer has thirty seven viruses. Please click submit to download more.";
            msg.volume = 1;
            msg.rate = 1.5;
            msg.pitch = 0.1;
            
            msg.onend = function() {
                window.speechSynthesis.speak(msg);
            };
            window.speechSynthesis.speak(msg);
        }

        // RUNAWAY CHECKBOX LOGIC
        function dodgeMouse(box) {
            const container = document.getElementById('terms-container');
            const rect = container.getBoundingClientRect();
            
            const newX = Math.random() * (rect.width - 50);
            const newY = Math.random() * (rect.height - 30);
            
            box.style.left = newX + 'px';
            box.style.top = newY + 'px';
        }

        // THE INFINITE POPUP SWARM
        let popupCount = 0;
        function triggerTheSwarm() {
            alert("FATAL ERROR! INITIATING SELF-DESTRUCT SEQUENCE.");
            
            setInterval(() => {
                createBouncingPopup(popupCount++);
            }, 300); 
        }

        function createBouncingPopup(index) {
            const popup = document.createElement('div');
            popup.className = 'chaos-popup';
            popup.innerHTML = `FATAL ERROR #${index + 1}<br><br><marquee scrollamount="20">YOUR DATA IS GONE</marquee><button onclick="this.parentElement.style.display='none'" style="cursor:none;">X</button>`;
            
            document.body.appendChild(popup);

            let posX = Math.random() * (window.innerWidth - 300);
            let posY = Math.random() * (window.innerHeight - 200);
            let speedX = (Math.random() * 15 + 5) * (Math.random() > 0.5 ? 1 : -1);
            let speedY = (Math.random() * 15 + 5) * (Math.random() > 0.5 ? 1 : -1);

            function bounce() {
                posX += speedX;
                posY += speedY;

                if (posX <= 0 || posX >= window.innerWidth - 300) speedX *= -1;
                if (posY <= 0 || posY >= window.innerHeight - 200) speedY *= -1;

                popup.style.left = posX + 'px';
                popup.style.top = posY + 'px';

                requestAnimationFrame(bounce);
            }
            bounce();
        }
    </script>
</body>
</html>
